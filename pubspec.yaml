name: adstacksmedia_dashboard
description: Adstacks Media Office Dashboard - Flutter Web
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  fl_chart: ^0.68.0
  table_calendar: ^3.1.2
  google_fonts: ^6.2.1
  intl: ^0.19.0
  equatable: ^2.0.5
  gap: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/