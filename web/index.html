<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Adstacks Media Office Dashboard">
  <meta name="theme-color" content="#4A6CF7">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Adstacks Media">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Google Fonts preconnect — reduces Inter font load delay -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Adstacks Media Dashboard</title>
  <link rel="manifest" href="manifest.json">

  <!-- Prevents flash of white background before Flutter loads -->
  <style>
    body {
      background-color: #F4F5F7;
      margin: 0;
      padding: 0;
    }
    #loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #F4F5F7;
    }
    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 2.5px solid #E5E7EB;
      border-top-color: #4A6CF7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Loading spinner shown before Flutter initializes -->
  <div id="loading">
    <div class="loading-spinner"></div>
  </div>

  <script>
    // Remove loading spinner once Flutter renders first frame
    window.addEventListener('flutter-first-frame', function() {
      var loading = document.getElementById('loading');
      if (loading) loading.remove();
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
